services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: donor
      POSTGRES_PASSWORD: donor
      POSTGRES_DB: donor_funding
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donor -d donor_funding"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_minio
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
  minio-init:
    image: minio/mc
    depends_on: [minio]
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "sleep 3; mc alias set local http://minio:9000 minio minio_minio && mc mb -p local/ngo-private && mc mb -p local/ngo-public || true",
      ]
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Loads backend/.env into the container (Stripe, JWT, etc.). Values below override same keys for Docker networking.
    env_file:
      - ./backend/.env
    ports: ["4000:4000"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://donor:donor@postgres:5432/donor_funding
      MINIO_ENDPOINT: http://minio:9000
      # Browser uploads / signed image URLs (host must resolve on the user's machine)
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_minio
      MINIO_BUCKET_PRIVATE: ngo-private
      MINIO_BUCKET_PUBLIC: ngo-public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      # Stripe: set STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET in backend/.env (do not duplicate empty keys here or they override env_file).
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e}
      MPESA_TRANSACTION_TYPE: ${MPESA_TRANSACTION_TYPE:-CustomerPayBillOnline}
      MPESA_STK_CALLBACK_URL: ${MPESA_STK_CALLBACK_URL:-}
    command:
      [
        "sh",
        "-c",
        "npx prisma migrate deploy && exec node dist/src/main.js",
      ]
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports: ["3000:3000"]
    depends_on: [api]
    environment:
      # Server-side BFF routes must call the API by service name, not localhost.
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:4000}

  # Optional M-Pesa dev tunnel: `docker compose --profile mpesa up -d`
  # Set NGROK_AUTHTOKEN, start stack, open http://localhost:4040 for the public https URL,
  # then set MPESA_STK_CALLBACK_URL on `api` to https://<subdomain>.ngrok-free.app/webhooks/mpesa/stk (restart api).
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["mpesa"]
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    command: ["http", "--log=stdout", "api:4000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports: ["4040:4040"]

volumes:
  pgdata:
  miniodata:
